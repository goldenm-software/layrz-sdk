name: "Lint check"

on:
  pull_request:
    branches: [ main, next, development ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Setup UV
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: ./python
          cache-python: true
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        working-directory: ./python
        run: uv sync --frozen

      - name: Run Python checks and tests with coverage
        working-directory: ./python
        run: |
          uv run ruff check
          uv run ty check
          uv run pytest ./tests/ --cov=layrz_sdk --cov-report=term --cov-report=json:coverage.json

      - name: Upload Python coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python/coverage.json
          retention-days: 1

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'
          cache-dependency-path: go/go.sum

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: ./go
          version: v2.8

      - name: Run tests with coverage
        working-directory: ./go
        run: |
          go test ./... -v -coverprofile=coverage.out
          go tool cover -func=coverage.out > coverage-summary.txt

      - name: Upload Go coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            go/coverage.out
            go/coverage-summary.txt
          retention-days: 1

  coverage-comment:
    needs: [lint-python, lint-go]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Python coverage
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: python-coverage
        continue-on-error: true

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: go-coverage
        continue-on-error: true

      - uses: ./.github/actions/coverage-comment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-dart: true
          python-coverage-path: python-coverage/coverage.json
          go-coverage-path: go-coverage/coverage-summary.txt

  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/changelog
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-comment: true